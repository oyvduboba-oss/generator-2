<!DOCTYPE html>
<html lang="ru" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <title>PECS Card Generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var saved = localStorage.getItem("pecs-theme");
        if (saved === "dark" || saved === "light") {
          document.documentElement.setAttribute("data-theme", saved);
        }
      })();
    </script>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(63, 58, 52, 0.15);
        background-color: var(--light-neutral);
        color: var(--text-main);
        font-family: "Nunito", sans-serif;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
        flex-shrink: 0;
      }

      .theme-toggle:hover {
        border-color: var(--soft-blue);
      }

      .theme-toggle__icon {
        font-size: 16px;
        line-height: 1;
      }

      [data-theme="light"] .theme-toggle__icon--dark,
      [data-theme="dark"] .theme-toggle__icon--light {
        display: none;
      }

      [data-theme="dark"] {
        --page-bg: #2a2622;
        --text-main: #f0ebe3;
        --light-neutral: #3a3530;
        --soft-blue: #7a9ab5;
        --sage-green: #7a9475;
      }

      [data-theme="dark"] .app-subtitle,
      [data-theme="dark"] .hint {
        color: rgba(240, 235, 227, 0.75);
      }

      [data-theme="dark"] .controls,
      [data-theme="dark"] .preview-section {
        border-color: rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      [data-theme="dark"] input[type="text"],
      [data-theme="dark"] select,
      [data-theme="dark"] input[type="file"] {
        background-color: #2f2a26;
        border-color: rgba(255, 255, 255, 0.12);
        color: var(--text-main);
      }

      [data-theme="dark"] .secondary-button {
        background-color: #4a443d;
        color: var(--text-main);
      }

      [data-theme="dark"] .secondary-button:hover {
        background-color: #565048;
      }

      [data-theme="dark"] .card-preview-container {
        background-color: #1f1c19;
      }

      [data-theme="dark"] .theme-toggle {
        border-color: rgba(255, 255, 255, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div>
          <h1>PECS Card Generator</h1>
          <p class="app-subtitle">
            Одноэкранное приложение для создания PECS / AAC карточки и экспорта в PNG.
          </p>
        </div>
        <button
          type="button"
          id="themeToggle"
          class="theme-toggle"
          aria-label="Переключить светлую и тёмную тему"
        >
          <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">☀</span>
          <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">☾</span>
          <span id="themeToggleLabel">Тёмная тема</span>
        </button>
      </header>

      <main class="app-main">
        <section class="controls">
          <h2 class="section-title">Настройки карточки</h2>

          <div class="control-group">
            <label for="imageInput">Изображение</label>
            <input
              id="imageInput"
              type="file"
              accept="image/png,image/jpeg,image/webp"
            />
            <p class="hint">Форматы: JPG, PNG, WEBP.</p>
          </div>

          <div class="control-group">
            <label for="captionInput">Подпись (до 30 символов)</label>
            <input
              id="captionInput"
              type="text"
              maxlength="30"
              placeholder="Введите слово или короткую фразу"
            />
          </div>

          <div class="control-row">
            <div class="control-group">
              <label for="languageSelect">Язык подписи</label>
              <select id="languageSelect">
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
                <option value="ru">Русский</option>
              </select>
            </div>

            <div class="control-group">
              <label for="sizeSelect">Размер карточки</label>
              <select id="sizeSelect">
                <option value="medium">Medium — 600×600</option>
                <option value="small">Small — 450×450</option>
                <option value="large">Large — 900×900</option>
                <option value="class">Class — 1200×1200</option>
              </select>
            </div>
          </div>

          <div class="control-group">
            <label for="styleSelect">Визуальный стиль</label>
            <select id="styleSelect">
              <option value="montessori">Premium Montessori</option>
              <option value="photo">Photorealism</option>
            </select>
          </div>

          <div class="control-group">
            <label for="labelPositionSelect">Расположение надписи</label>
            <select id="labelPositionSelect">
              <option value="auto">Автоматически по стилю</option>
              <option value="none">Без надписи</option>
            </select>
          </div>

          <div class="control-group">
            <label for="aacCategorySelect">Категория AAC</label>
            <select id="aacCategorySelect">
              <option value="nouns">Nouns / Существительные</option>
              <option value="verbs">Verbs / Действия</option>
              <option value="describing">Describing words / Описательные</option>
              <option value="people">People &amp; Pronouns / Люди</option>
              <option value="social">Social words / Социальные</option>
              <option value="misc">Miscellaneous / Прочее</option>
            </select>
          </div>

          <div class="control-group control-actions">
            <button id="exportButton" class="primary-button">Export PNG</button>
            <button id="resetButton" class="secondary-button">Reset</button>
          </div>

          <p id="errorMessage" class="error-message" aria-live="polite"></p>
        </section>

        <section class="preview-section">
          <h2 class="section-title">Live preview</h2>

          <div class="preview-wrapper">
            <div class="card-preview-container">
              <div id="cardPreview" class="card card--medium card--montessori">
                <div class="card-inner">
                  <div class="card-image-wrapper">
                    <div id="imagePlaceholder" class="card-image-placeholder">
                      Upload image
                    </div>
                    <img id="cardImage" class="card-image" alt="" />
                  </div>
                  <div id="cardLabelArea" class="card-label-area card-label-area--top">
                    <span id="cardLabelText" class="card-label-text"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <p class="hint">
            Preview должен максимально точно соответствовать тому, что попадёт в PNG.
          </p>
        </section>
      </main>
    </div>

    <script>
      (function () {
        var themeToggle = document.getElementById("themeToggle");
        var themeToggleLabel = document.getElementById("themeToggleLabel");
        var root = document.documentElement;

        function updateThemeLabel() {
          var isDark = root.getAttribute("data-theme") === "dark";
          themeToggleLabel.textContent = isDark ? "Светлая тема" : "Тёмная тема";
          themeToggle.setAttribute(
            "aria-label",
            isDark ? "Включить светлую тему" : "Включить тёмную тему"
          );
        }

        themeToggle.addEventListener("click", function () {
          var nextTheme =
            root.getAttribute("data-theme") === "dark" ? "light" : "dark";
          root.setAttribute("data-theme", nextTheme);
          localStorage.setItem("pecs-theme", nextTheme);
          updateThemeLabel();
        });

        updateThemeLabel();
      })();
    </script>
    <script src="script.js"></script>
  </body>
</html>
